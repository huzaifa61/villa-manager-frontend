[phases.setup]
nixPkgs = ["nodejs_20"]

[phases.install]
cmds = ["npm install --legacy-peer-deps"]

[phases.build]
cmds = [
  "echo 'EXPO_PUBLIC_API_URL=https://villa-manager-backend-production.up.railway.app/api' > .env",
  "npm run build:web"
]

[start]
cmd = "./node_modules/.bin/serve dist --listen tcp://0.0.0.0:$PORT --single"
